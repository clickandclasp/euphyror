<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>euphyror | Socials</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400;500&display=swap');

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            /* Elegant Salmon Pink Gradient */
            background: linear-gradient(135deg, #2d1b1e, #4a2c30);
            color: #fffaf9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 182, 193, 0.2);
            border-radius: 30px;
            padding: 40px 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .profile-pic {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 4px solid #fa8072; /* Salmon border */
            box-shadow: 0 0 15px rgba(250, 128, 114, 0.3);
        }

        .username {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 30px;
            color: #ffa07a; /* Light Salmon */
            letter-spacing: 1.5px;
        }

        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-item {
            display: flex;
            align-items: center;
            padding: 16px 22px;
            border-radius: 50px; /* More rounded/girly aesthetic */
            background: rgba(255, 255, 255, 0.05);
            color: #fffaf9;
            text-decoration: none;
            font-size: 14px;
            font-weight: 400;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .link-item:hover {
            background: #fa8072;
            color: white;
            transform: scale(1.02);
            border-color: #ffb5a7;
        }

        .link-item i { width: 25px; font-size: 18px; }

        .footer {
            margin-top: 35px;
            font-size: 10px;
            letter-spacing: 1px;
            opacity: 0.6;
        }

        /* Mobile Optimization */
        @media (max-width: 480px) {
            .container { padding: 30px 20px; }
            .username { font-size: 24px; }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- Remember to replace 'your-image-url.jpg' with your actual image path -->
    <img src="your-image-url.jpg" alt="Profile" class="profile-pic">
    <div class="username">euphyror</div>

    <div class="links-wrapper">
        <a href="https://www.instagram.com/euphyror/" target="_blank" class="link-item">
            <i class="fa-brands fa-instagram"></i> <span>Instagram</span>
        </a>
        <a href="https://www.facebook.com/Gwyn15" target="_blank" class="link-item">
            <i class="fa-brands fa-facebook-f"></i> <span>Facebook</span>
        </a>
        <a href="https://www.tiktok.com/@euphyror" target="_blank" class="link-item">
            <i class="fa-brands fa-tiktok"></i> <span>TikTok</span>
        </a>
        <a href="https://open.spotify.com/user/31fgassy6xjrifzsxgk4dpolkdtu?si=c2ecf4998c184637" target="_blank" class="link-item">
            <i class="fa-brands fa-spotify"></i> <span>Spotify</span>
        </a>
        <a href="https://www.roblox.com/users/3728185580/profile" target="_blank" class="link-item">
            <i class="fa-solid fa-gamepad"></i> <span>Roblox</span>
        </a>
    </div>

    <div class="footer">© 2026 euphyror.</div>

</div>

</body>
</html>
