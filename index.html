<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>euphyror | Socials</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400;500&display=swap');

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            /* Light Blush Pink Gradient */
            background: linear-gradient(135deg, #fff0f3, #ffe4e6);
            color: #5d4a4d;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 182, 193, 0.3);
            border-radius: 30px;
            padding: 40px 30px;
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.2);
        }

        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            border: 3px solid #ffccd5;
        }

        .username {
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 5px;
            color: #d68c96;
        }

        .subtitle {
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 30px;
            opacity: 0.7;
        }

        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            border-radius: 50px;
            background: #ffffff;
            color: #d68c96;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            border: 1px solid #ffe4e6;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .link-item:hover {
            background: #ffccd5;
            color: white;
            transform: translateY(-2px);
        }

        .link-item i { width: 30px; font-size: 16px; }

        .footer {
            margin-top: 35px;
            font-size: 10px;
            opacity: 0.4;
        }

        @media (max-width: 480px) {
            .container { padding: 30px 20px; }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- Remember to replace 'your-image-url.jpg' with your photo link -->
    <img src="your-image-url.jpg" alt="Profile" class="profile-pic">
    
    <div class="username">euphyror</div>
    <div class="subtitle">Socials & Contacts</div>

    <div class="links-wrapper">
        <a href="https://www.instagram.com/euphyror/" target="_blank" class="link-item">
            <i class="fa-brands fa-instagram"></i> <span>Instagram</span>
        </a>
        <a href="https://www.facebook.com/Gwyn15" target="_blank" class="link-item">
            <i class="fa-brands fa-facebook-f"></i> <span>Facebook</span>
        </a>
        <a href="https://www.tiktok.com/@euphyror" target="_blank" class="link-item">
            <i class="fa-brands fa-tiktok"></i> <span>TikTok</span>
        </a>
        <a href="https://open.spotify.com/user/31fgassy6xjrifzsxgk4dpolkdtu?si=c2ecf4998c184637" target="_blank" class="link-item">
            <i class="fa-brands fa-spotify"></i> <span>Spotify</span>
        </a>
        <a href="https://www.roblox.com/users/3728185580/profile" target="_blank" class="link-item">
            <i class="fa-solid fa-gamepad"></i> <span>Roblox</span>
        </a>
    </div>

    <div class="footer">© 2026 euphyror.</div>

</div>

</body>
</html>
